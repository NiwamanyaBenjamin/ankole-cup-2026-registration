<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Ankole Cup 2026 | Login</title><link rel="stylesheet" href="style.css"></head>
<body class="login-wrap"><form class="login-card" action="/admin-login" method="POST"><img src="ankole-logo.png" alt="Ankole Cup logo"><h1>Competition Portal</h1><p>Authorized access only</p><p id="error" class="error" style="display:none">Invalid username or password.</p><input name="username" placeholder="Username" autocomplete="username" required><input name="password" type="password" placeholder="Password" autocomplete="current-password" required><button type="submit">Sign In</button></form><script>if(location.search.includes('error=1'))document.getElementById('error').style.display='block';</script></body></html>
